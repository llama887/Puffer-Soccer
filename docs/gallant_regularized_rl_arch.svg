<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbf7"/>
      <stop offset="55%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#fff8ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#24364a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263447"/>
    </marker>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #183022; }
      .subtitle { font: 18px Georgia, serif; fill: #43546a; }
      .box-title { font: 700 22px Georgia, serif; fill: #172334; }
      .box-text { font: 16px Georgia, serif; fill: #314258; }
      .small { font: 14px Georgia, serif; fill: #4a5b70; }
      .tiny { font: 12px Georgia, serif; fill: #607083; }
      .math { font: 700 18px Georgia, serif; fill: #17324c; }
      .pill { font: 700 15px Georgia, serif; fill: #ffffff; }
      .line { stroke: #263447; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #7c8ca0; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <circle cx="1180" cy="90" r="130" fill="#d8ecd8" opacity="0.45"/>
  <circle cx="120" cy="690" r="170" fill="#dbeafe" opacity="0.55"/>

  <text x="64" y="70" class="title">Gallant Regularized RL Policy Network</text>
  <text x="64" y="102" class="subtitle">Feedforward actor-critic: regularization changes the PPO loss, not the network shape</text>

  <g filter="url(#shadow)">
    <rect x="60" y="155" width="310" height="260" rx="22" fill="#ffffff"/>
    <text x="88" y="194" class="box-title">Per-Agent Observation</text>
    <text x="88" y="230" class="math">86 inputs for 5v5</text>
    <text x="88" y="262" class="box-text">Formula: 16 + 14n</text>
    <text x="88" y="291" class="box-text">n = players per team = 5</text>
    <text x="88" y="320" class="box-text">16 + 14*5 = 86</text>
    <line x1="88" y1="344" x2="340" y2="344" class="thin"/>
    <text x="88" y="372" class="small">One focused player sees itself,</text>
    <text x="88" y="394" class="small">the ball, teammates, and opponents.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="155" width="180" height="260" rx="22" fill="#e8f5e9"/>
    <text x="466" y="205" class="box-title">Layer 1</text>
    <text x="459" y="250" class="math">Linear</text>
    <text x="462" y="280" class="math">86 -> 256</text>
    <rect x="464" y="320" width="112" height="38" rx="19" fill="#2f7d46"/>
    <text x="499" y="345" class="pill">ReLU</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="690" y="155" width="180" height="260" rx="22" fill="#e7f0ff"/>
    <text x="726" y="205" class="box-title">Layer 2</text>
    <text x="719" y="250" class="math">Linear</text>
    <text x="713" y="280" class="math">256 -> 256</text>
    <rect x="724" y="320" width="112" height="38" rx="19" fill="#3769b1"/>
    <text x="759" y="345" class="pill">ReLU</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="122" width="260" height="144" rx="22" fill="#fff1d6"/>
    <text x="990" y="165" class="box-title">Action Head</text>
    <text x="992" y="204" class="math">Linear 256 -> 13</text>
    <text x="992" y="232" class="small">13 discrete action logits</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="320" width="260" height="120" rx="22" fill="#f6eaff"/>
    <text x="998" y="363" class="box-title">Value Head</text>
    <text x="992" y="402" class="math">Linear 256 -> 1</text>
    <text x="992" y="430" class="small">state-value estimate</text>
  </g>

  <path d="M370 285 C395 285 405 285 430 285" class="line"/>
  <path d="M610 285 C645 285 655 285 690 285" class="line"/>
  <path d="M870 285 C910 210 920 194 950 194" class="line"/>
  <path d="M870 285 C910 360 920 380 950 380" class="line"/>

  <g filter="url(#shadow)">
    <rect x="60" y="485" width="548" height="200" rx="22" fill="#ffffff"/>
    <text x="88" y="526" class="box-title">Why 86 Observation Inputs?</text>
    <text x="88" y="562" class="box-text">Fixed/self/ball fields: 23 = time 1 + self 6 + identity 11 + ball 5</text>
    <text x="88" y="594" class="box-text">Teammates: 7*(n-1), because the focused player skips itself</text>
    <text x="88" y="626" class="box-text">Opponents: 7*n</text>
    <text x="88" y="658" class="math">23 + 7*(n-1) + 7*n = 16 + 14n = 86 when n=5</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="672" y="485" width="538" height="200" rx="22" fill="#ffffff"/>
    <text x="700" y="526" class="box-title">Why 13 Action Outputs?</text>
    <text x="700" y="562" class="box-text">5 base actions: noop, move forward, move backward, rotate left, rotate right</text>
    <text x="700" y="594" class="box-text">8 kick-strength buckets: action ids 5 through 12</text>
    <text x="700" y="626" class="math">5 + 8 = 13 logits</text>
    <text x="700" y="658" class="small">The policy samples from a categorical distribution over these logits.</text>
  </g>
</svg>
